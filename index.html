<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Conteos PD — Agua Santa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;display:flex;justify-content:center}
.app{width:100%;max-width:480px;display:flex;flex-direction:column;height:100vh}
.header{background:#3B6D11;color:#EAF3DE;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;background:#97C459;flex-shrink:0}
.mode-toggle{display:flex;gap:6px;margin-left:auto}
.mode-btn{padding:5px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.4);background:transparent;color:#EAF3DE;font-size:12px;cursor:pointer}
.mode-btn.active{background:#EAF3DE;color:#3B6D11;border-color:#EAF3DE;font-weight:500}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;background:#fff}
.msg{max-width:88%;padding:10px 13px;border-radius:14px;line-height:1.55;font-size:14px}
.bot{align-self:flex-start;background:#f0f0eb;color:#1a1a1a}
.usr{align-self:flex-end;background:#3B6D11;color:#EAF3DE}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;width:100%}
.btn-grid.col1{grid-template-columns:1fr}
.btn-grid.col3{grid-template-columns:1fr 1fr 1fr}
.btn-opt{padding:11px 8px;border-radius:10px;border:1.5px solid #c8d8b0;background:#fff;cursor:pointer;font-size:13px;color:#2a4a10;font-weight:500;text-align:center;-webkit-tap-highlight-color:transparent}
.btn-opt:active{background:#EAF3DE}
.btn-opt.accent{background:#3B6D11;color:#EAF3DE;border-color:#3B6D11}
.btn-opt.danger{border-color:#F09595;color:#A32D2D}
.btn-opt.neutral{border-color:#ccc;color:#666}
.inp-area{flex-shrink:0;background:#fff;border-top:1px solid #e5e5e0;padding:10px 12px}
.inp-row{display:flex;gap:8px}
.inp-row input{flex:1;height:42px;padding:0 14px;border:1.5px solid #ccc;border-radius:22px;font-size:15px;background:#f9f9f6;color:#1a1a1a;-webkit-appearance:none}
.inp-row input:focus{outline:none;border-color:#3B6D11}
.send-btn{width:42px;height:42px;border-radius:50%;border:none;background:#3B6D11;color:#EAF3DE;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.val-counter{padding:8px 4px 0;font-size:12px;color:#666}
.val-counter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.val-pills{display:flex;flex-wrap:wrap;gap:4px;max-height:72px;overflow-y:auto}
.val-pill{background:#EAF3DE;color:#3B6D11;border-radius:12px;padding:3px 9px;font-size:12px;font-weight:500}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;margin-left:4px}
.b-ok{background:#EAF3DE;color:#3B6D11}
.b-err{background:#FCEBEB;color:#A32D2D}
.resumen{background:#fff;border:1.5px solid #c8d8b0;border-radius:10px;padding:10px 13px;margin-top:8px;font-size:12px;line-height:2}
.resumen strong{font-weight:500;color:#555}
.chip{padding:6px 12px;border-radius:20px;border:1px solid #c8d8b0;background:#f9f9f6;cursor:pointer;font-size:12px;color:#2a4a10;margin:3px 2px;display:inline-block}
.chips{margin-top:8px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="dot"></div>
    <div><div style="font-size:15px;font-weight:500">Conteos PD</div><div style="font-size:11px;opacity:0.75">Agua Santa</div></div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-registro" onclick="setMode('registro')">Registro</button>
      <button class="mode-btn" id="btn-consulta" onclick="setMode('consulta')">Consulta</button>
    </div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="inp-area" id="inp-area">
    <div class="inp-row">
      <input type="text" id="inp" placeholder="O escribe aqui..." inputmode="text"/>
      <button class="send-btn" onclick="send()">↑</button>
    </div>
  </div>
</div>

function el(id){return document.getElementById(id);}
function msgs(){return el('msgs');}

function addMsg(html,cls){
  const d=document.createElement('div');
  d.className='msg '+cls;d.innerHTML=html;
  msgs().appendChild(d);msgs().scrollTop=msgs().scrollHeight;
  return d;
}
function bot(html){return addMsg(html,'bot');}
function usr(text){addMsg(text,'usr');}

function botBtns(html,options,cols){
  const d=bot(html);
  if(!options||!options.length) return d;
  const g=document.createElement('div');
  g.className='btn-grid'+(cols===1?' col1':cols===3?' col3':'');
  options.forEach(opt=>{
    if(!opt) return;
    const label=typeof opt==='string'?opt:opt.label;
    const val=typeof opt==='string'?opt:opt.value;
    const cls=typeof opt==='object'?(opt.accent?' accent':opt.danger?' danger':opt.neutral?' neutral':''):'';
    const b=document.createElement('button');
    b.className='btn-opt'+cls;b.textContent=label;
    b.onclick=()=>handleInput(val);g.appendChild(b);
  });
  d.appendChild(g);msgs().scrollTop=msgs().scrollHeight;
  return d;
}

function send(){
  const inp=el('inp');const v=inp.value.trim();
  if(!v)return;inp.value='';handleInput(v);
}
el('inp').addEventListener('keydown',e=>{if(e.key==='Enter')send();});

function showValCounter(){
  const area=el('inp-area');let c=el('val-counter');
  if(!c){c=document.createElement('div');c.id='val-counter';c.className='val-counter';area.insertBefore(c,area.firstChild);}
  const avg=state.conteos.length?(state.conteos.reduce((a,b)=>a+b,0)/state.conteos.length).toFixed(1):'0';
  const pills=state.conteos.map(v=>`<span class="val-pill">${v}</span>`).join('');
  c.innerHTML=`<div class="val-counter-row"><span><b>${state.conteos.length}</b> valores · prom: <b>${avg}</b></span>
    <button class="btn-opt accent" style="padding:6px 14px;font-size:12px;border-radius:20px" onclick="handleInput('fin')">Listo</button></div>
    <div class="val-pills">${pills}</div>`;
}
function hideValCounter(){const c=el('val-counter');if(c)c.remove();}

function setMode(m){
  mode=m;
  el('btn-registro').classList.toggle('active',m==='registro');
  el('btn-consulta').classList.toggle('active',m==='consulta');
  el('inp').setAttribute('inputmode','text');
  el('inp').placeholder=m==='consulta'?'Escribe tu consulta...':'O escribe aqui...';
  if(m==='consulta'){
    state={step:0,data:{},conteos:[]};hideValCounter();
    const d=bot('Modo consulta activo. Puedes preguntarme sobre conteos registrados o sobre los cuarteles.');

    botBtns('Modo registro.',[{label:'+ Nuevo conteo',value:'nuevo conteo',accent:true}],1);

// ===================== CONSULTAS =====================

function esConsultaSuperficie(q){
  return /hectarea|superficie|cuantas ha|cuanta ha|cuanto mide|metros/.test(q);
}

function esConsultaCuartel(q){
  return /patron|conduccion|entrehilera|sobrehilera|plantacion|año|sistema|portainjerto/.test(q);
}

function esConsultaCSG(q){
  return /csg|codigo sag|codigo ag|rut/.test(q);
}

function respuestaDirecta(pregunta){
  const q=pregunta.toLowerCase();

  if(esConsultaSuperficie(q)){
    const palabras=q.split(/[\s,?]+/).filter(p=>p.length>3);
    const relevantes=CUARTELES_INFO.filter(r=>{
      const prod=(r.p||'').toLowerCase();
      const vari=(r.v||'').toLowerCase();
      const esp=(r.e||'').toLowerCase();
      return palabras.some(p=>prod.includes(p)||vari.includes(p)||esp.includes(p));
    });
    if(relevantes.length===0){
      const porProd={};
      CUARTELES_INFO.forEach(r=>{if(!porProd[r.p])porProd[r.p]=0;porProd[r.p]+=(r.s||0);});
      let resp='Superficie total por productor:<br>';
      Object.entries(porProd).sort((a,b)=>b[1]-a[1]).forEach(([p,s])=>{resp+=`• ${p}: ${s.toFixed(2)} ha<br>`;});
      return resp;
    }
    // Agrupar por productor -> variedad
    const porProdVar={};
    relevantes.forEach(r=>{
      if(!porProdVar[r.p]) porProdVar[r.p]={};
      const kv=`${r.v} (${r.e})`;
      if(!porProdVar[r.p][kv]) porProdVar[r.p][kv]={total:0,cuarteles:[]};
      porProdVar[r.p][kv].total+=(r.s||0);
      porProdVar[r.p][kv].cuarteles.push(`C${r.c}: ${r.s}ha`);
    });
    let resp='';
    Object.entries(porProdVar).forEach(([prod,vars])=>{
      resp+=`<b>${prod}</b><br>`;
      Object.entries(vars).forEach(([v,d])=>{
        resp+=`&nbsp;&nbsp;• ${v}: <b>${d.total.toFixed(2)} ha</b><br>`;
        resp+=`&nbsp;&nbsp;&nbsp;&nbsp;<small>${d.cuarteles.join(' | ')}</small><br>`;
      });
      resp+='<br>';
    });
    return resp;
  }

  if(esConsultaCuartel(q)){
    const palabras=q.split(/[\s,?]+/).filter(p=>p.length>3);
    const relevantes=CUARTELES_INFO.filter(r=>{
      return palabras.some(p=>(r.p||'').toLowerCase().includes(p)||(r.v||'').toLowerCase().includes(p)||(r.e||'').toLowerCase().includes(p));
    });
    if(relevantes.length===0) return null;
    let resp='';
    relevantes.slice(0,20).forEach(r=>{
      resp+=`<b>${r.p} C${r.c}</b> — ${r.e} ${r.v}<br>`;
      resp+=`<small>Sup: ${r.s}ha | ${r.eh}x${r.sh}m | Año: ${r.ap} | ${r.cd||''} | ${r.pt||''}</small><br><br>`;
    });
    return resp;
  }

  if(esConsultaCSG(q)){
    const palabras=q.split(/[\s,?]+/).filter(p=>p.length>3);
    const relevantes=Object.entries(PRODUCTORES_CSG).filter(([p])=>palabras.some(w=>p.toLowerCase().includes(w)));
    if(relevantes.length===0) return null;
    let resp='';
    relevantes.forEach(([p,d])=>{
      resp+=`<b>${p}</b><br>CSG: ${d.csg} | Grupo: ${d.grupo||'-'} | Zonal: ${d.zonal||'-'}<br><br>`;
    });
    return resp;
  }

  return null;
}

async function consultarIA(pregunta){
  const ld=bot('<span class="spin">...</span> Consultando...');
  try{
    const resp=await fetch(SHEETS_URL);
    const json=await resp.json();
    const records=json.records||[];
    const resumen=records.map(r=>{
      const vals=Object.entries(r).filter(([k])=>!isNaN(k)&&r[k]!=='').map(([,v])=>Number(v));
      const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):'-';
      return `${r['Productor']||''}|${r['Especie']||''}|${r['Variedad']||''}|C${r['Cuartel']||''}|${r['Conteo']||''}|${r['Momento']||''}|${r['Temporada']||''}|n=${vals.length}|prom=${avg}`;
    }).join('
');
    const prompt=`Eres asistente agronomico de Exportadora Agua Santa. Registros de conteos (Productor|Especie|Variedad|Cuartel|Conteo|Momento|Temporada|n=cant|prom=promedio):

${resumen}

Responde en espanol conciso: ${pregunta}`;
    const gr=await fetch(GROQ_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:500,temperature:0.3})});
    const gj=await gr.json();
    ld.remove();
    const txt=gj?.choices?.[0]?.message?.content||'No se pudo obtener respuesta.';
    mostrarRespuesta(txt.replace(/
/g,'<br>'));
  }catch(err){ld.remove();bot('Error: '+err.message);}
}

function mostrarRespuesta(html){
  const d=bot(html);
  const div=document.createElement('div');div.className='chips';
  [{label:'Nueva consulta',fn:()=>el('inp').focus()},{label:'Ir a registro',fn:()=>setMode('registro')}].forEach(o=>{
    const b=document.createElement('button');b.className='chip';b.textContent=o.label;b.onclick=o.fn;div.appendChild(b);
  });
  d.appendChild(div);msgs().scrollTop=msgs().scrollHeight;
}

// ===================== REGISTRO =====================

async function enviarASheets(data){
  const ld=bot('<span class="spin">...</span> Enviando...');
  try{
    const r=await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify(data),headers:{'Content-Type':'text/plain'}});
    const j=await r.json();ld.remove();
    if(j.status==='ok'){
      botBtns('Guardado en Google Sheets <span class="badge b-ok">fila '+j.fila+'</span>',
        [{label:'+ Nuevo conteo',value:'nuevo conteo',accent:true},{label:'Consultar datos',value:'_consulta'}],2);
    }else{botBtns('Error al guardar',[{label:'Nuevo conteo',value:'nuevo conteo'}],1);}
  }catch(e){ld.remove();botBtns('Sin conexion',[{label:'Reintentar',value:'confirmar'},{label:'Nuevo conteo',value:'nuevo conteo'}]);}
}

function mostrarResumen(){
  const s=state;
  const avg=(s.conteos.reduce((a,b)=>a+b,0)/s.conteos.length).toFixed(1);
  const d=bot(`Confirmar envio?<div class="resumen">
    <strong>Productor:</strong> ${s.data.productor}<br>
    <strong>Especie/Variedad:</strong> ${s.data.especie} / ${s.data.variedad}<br>
    <strong>Cuartel:</strong> ${s.data.cuartel}${s.data.sector?' / '+s.data.sector:''}<br>
    <strong>Conteo:</strong> ${s.data.conteo} - ${s.data.momento}<br>
    <strong>Temporada:</strong> ${s.data.temporada} | <strong>Fecha:</strong> ${s.data.fecha}<br>
    <strong>Valores (${s.conteos.length}):</strong> ${s.conteos.join(', ')}<br>
    <strong>Prom:</strong> ${avg} | <strong>Min:</strong> ${Math.min(...s.conteos)} | <strong>Max:</strong> ${Math.max(...s.conteos)}
  </div>`);
  const g=document.createElement('div');g.className='btn-grid';
  [{label:'Confirmar',value:'confirmar',accent:true},{label:'Corregir',value:'corregir'},{label:'Cancelar',value:'cancelar',danger:true}].forEach(o=>{
    const b=document.createElement('button');b.className='btn-opt'+(o.accent?' accent':o.danger?' danger':'');
    b.textContent=o.label;b.onclick=()=>handleInput(o.value);g.appendChild(b);
  });
  d.appendChild(g);msgs().scrollTop=msgs().scrollHeight;
}

function getCuarteles(prod,esp,varName){
  try{return DATA[prod][esp][varName]||[];}catch(e){return[];}
}

// ===================== HANDLER PRINCIPAL =====================

function handleInput(text){
  if(text==='_consulta'){setMode('consulta');return;}
  if(mode==='consulta'){
    usr(text);
    const directa=respuestaDirecta(text);
    if(directa){mostrarRespuesta(directa);}
    else{consultarIA(text);}
    return;
  }

  usr(text);
  const s=state;const t=text.trim().toLowerCase();

  if(t==='nuevo conteo'){
    s.step=0;s.data={};s.conteos=[];hideValCounter();
    el('inp').setAttribute('inputmode','text');
    botBtns('Cual es el productor?',PRODUCTORES);return;
  }

  switch(s.step){
    case 0:{
      const prod=PRODUCTORES.find(p=>p.toLowerCase()===t)||PRODUCTORES.find(p=>p.toLowerCase().includes(t));
      if(prod){s.data.productor=prod;s.step=1;botBtns('Especie:',Object.keys(DATA[prod]).sort(),2);}
      else botBtns('No encontrado. Elige el productor:',PRODUCTORES);break;
    }
    case 1:{
      const especies=Object.keys(DATA[s.data.productor]);
      const esp=especies.find(e=>e.toLowerCase()===t)||especies.find(e=>e.toLowerCase().includes(t));
      if(esp){s.data.especie=esp;s.step=2;const vars=Object.keys(DATA[s.data.productor][esp]).sort();botBtns('Variedad:',[...vars,{label:'+ otra',value:'_var_manual',neutral:true}],2);}
      else botBtns('Elige la especie:',Object.keys(DATA[s.data.productor]).sort(),2);break;
    }
    case 2:{
      if(t==='_var_manual'){bot('Escribe la variedad:');s.step=2.5;break;}
      s.data.variedad=text;s.step=3;
      const cs=getCuarteles(s.data.productor,s.data.especie,text);
      botBtns('Cuartel:',cs.length?[...cs,{label:'+ otro',value:'_cuartel_manual',neutral:true}]:[{label:'Escribir cuartel',value:'_cuartel_manual',neutral:true}],3);break;
    }
    case 2.5:{s.data.variedad=text;s.step=3.5;bot('Escribe el cuartel:');break;}
    case 3:{
      if(t==='_cuartel_manual'){s.step=3.5;bot('Escribe el cuartel:');break;}
      s.data.cuartel=text;s.step=4;
      botBtns('Sector (si aplica):',['N','S','KGB1','KGB2',{label:'No aplica',value:'-',neutral:true}],3);break;
    }
    case 3.5:{s.data.cuartel=text;s.step=4;botBtns('Sector (si aplica):',['N','S','KGB1','KGB2',{label:'No aplica',value:'-',neutral:true}],3);break;}
    case 4:{s.data.sector=(t==='-'||t==='no aplica')?'':text;s.step=5;botBtns('Tipo de conteo:',CONTEOS,2);break;}
    case 5:{
      const con=CONTEOS.find(c=>c.toLowerCase()===t);
      if(con){s.data.conteo=con;s.step=6;botBtns('Momento fenologico:',MOMENTOS,2);}
      else botBtns('Elige el tipo:',CONTEOS,2);break;
    }
    case 6:{
      const mom=MOMENTOS.find(m=>m.toLowerCase()===t);
      if(mom){s.data.momento=mom;s.step=7;botBtns('Temporada:',TEMPORADAS,2);}
      else botBtns('Elige el momento:',MOMENTOS,2);break;
    }
    case 7:{
      s.data.temporada=text;s.step=8;
      const td=new Date();const hoy=String(td.getDate()).padStart(2,'0')+'/'+String(td.getMonth()+1).padStart(2,'0')+'/'+td.getFullYear();
      botBtns('Fecha:',[hoy,{label:'Otra fecha',value:'_fecha_manual',neutral:true}],1);break;
    }
    case 8:{
      if(t==='_fecha_manual'){bot('Escribe la fecha (DD/MM/AAAA):');s.step=8.5;break;}
      s.data.fecha=text;s.step=9;s.conteos=[];
      el('inp').setAttribute('inputmode','decimal');
      bot('Ingresa los valores uno por uno o separados por coma: 810, 609, 728');
      showValCounter();break;
    }
    case 8.5:{s.data.fecha=text;s.step=9;s.conteos=[];el('inp').setAttribute('inputmode','decimal');bot('Ingresa los valores:');showValCounter();break;}
    case 9:{
      if(t==='fin'||t==='listo'){
        if(!s.conteos.length){bot('Ingresa al menos 1 valor.');break;}
        hideValCounter();el('inp').setAttribute('inputmode','text');s.step=10;mostrarResumen();
      }else if(t==='cancelar'){
        s.step=0;s.data={};s.conteos=[];hideValCounter();el('inp').setAttribute('inputmode','text');
        botBtns('Cancelado.',['nuevo conteo'],1);
      }else if(text.includes(',')||/^\d[\d\s]+\d$/.test(text)){
        const nums=text.split(/[,\s]+/).map(x=>parseFloat(x.replace(',','.'))).filter(x=>!isNaN(x));
        if(nums.length){s.conteos.push(...nums);showValCounter();}
        else bot('No se reconocieron numeros.');
      }else{
        const n=parseFloat(text.replace(',','.'));
        if(isNaN(n))bot('Ingresa un numero valido:');
        else{s.conteos.push(n);showValCounter();}
      }break;
    }
    case 10:{
      if(t==='confirmar'){
        const entry=Object.assign({},s.data,{valores:[...s.conteos]});
        s.step=0;s.data={};s.conteos=[];enviarASheets(entry);
      }else if(t==='corregir'){
        s.step=9;s.conteos=[];el('inp').setAttribute('inputmode','decimal');bot('Ingresa los valores nuevamente:');showValCounter();
      }else if(t==='cancelar'){
        s.step=0;s.data={};s.conteos=[];hideValCounter();el('inp').setAttribute('inputmode','text');
        botBtns('Cancelado.',['nuevo conteo'],1);
      }else mostrarResumen();break;
    }
  }
}

botBtns('Bienvenido a Conteos PD - Agua Santa',
  [{label:'+ Nuevo conteo',value:'nuevo conteo',accent:true},{label:'Consultar datos',value:'_consulta'}],2);
</script>
